# Run with: docker compose up --build
#
# Prerequisite: `python -m rag_eval.cli ingest` must have already populated
# data/index/ on the host (the index is gitignored and built locally, not baked
# into the image). .env must hold ANTHROPIC_API_KEY and OPENAI_API_KEY (see
# .env.example).
#
# - api:  http://localhost:8000  (docs at /docs, health at /health)
# - ui:   http://localhost:8501  (Streamlit, talks to api over the compose network)
services:
  api:
    build: .
    command: ["uvicorn", "rag_eval.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./results:/app/results:ro
      - hf-cache:/app/.hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      # First boot downloads the bge embedding (+ reranker) models from HuggingFace.
      start_period: 120s

  ui:
    build: .
    command: ["streamlit", "run", "app.py", "--server.address", "0.0.0.0", "--server.port", "8501", "--server.headless", "true"]
    environment:
      RAG_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  hf-cache:
